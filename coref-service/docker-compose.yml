services:
  coref-service:
    image: ghcr.io/lnamty/coref-service:lingmess
    build: .
    container_name: coref-service
    ports:
      - "5000:5000"
    environment:
      COREF_MODEL: ${COREF_MODEL:-cascade}         # cascade | lingmess | fcoref
      COREF_DEVICE: ${COREF_DEVICE:-cpu}           # cpu or cuda:0
      COREF_RESOLVE_MODE: ${COREF_RESOLVE_MODE:-anaphora}
      COREF_PRELOAD: "true"
      HF_HUB_DISABLE_XET: "1"
      S2E_MODEL_PATH: ${S2E_MODEL_PATH:-/models/s2e}
      S2E_AUTO_DOWNLOAD: ${S2E_AUTO_DOWNLOAD:-true}
    volumes:
      - coref-models:/models
      # Optional: mount your own s2e checkpoint instead of auto-downloading:
      # - ./s2e-model:/models/s2e:ro

volumes:
  coref-models:
